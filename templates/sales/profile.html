{% extends 'base.html' %}

{% block title %}Salesperson Profile{% endblock %}

{% block content %}
<div class="container">
    <h1 class="my-4">My Profile</h1>

    <!-- Profile Information -->
    <div class="card">
        <div class="card-body">
            <!-- Full Name -->
            <h5 class="card-title">Full Name</h5>
            <p class="card-text">{{ user.full_name or 'N/A' }}</p>
            <hr>

            <!-- Email Address -->
            <h5 class="card-title">Email Address</h5>
            <p class="card-text">{{ user.email or 'N/A' }}</p>
            <hr>

            <!-- Phone Number -->
            <h5 class="card-title">Phone Number</h5>
            <p class="card-text">{{ user.phone_number or 'N/A' }}</p>
            <hr>

            <!-- Additional Fields -->
            <!-- Add other fields as needed -->
        </div>
    </div>
</div>
{% endblock %}
